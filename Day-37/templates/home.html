<!DOCTYPE html>
<html>
<head>
    <title>My Blog</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 700px;
            margin: 40px auto;
            padding: 0 20px;
            background: #f9f9f9;
            color: #333;
        }
        header {
            text-align: center;
            margin-bottom: 40px;
        }
        header h1 {
            font-size: 36px;
            margin-bottom: 5px;
        }
        header p {
            color: #888;
        }
        .post-card {
            background: white;
            padding: 20px 25px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.08);
        }
        .post-card h2 {
            margin: 0 0 5px 0;
        }
        .post-card h2 a {
            text-decoration: none;
            color: #4a90e2;
        }
        .post-card h2 a:hover {
            text-decoration: underline;
        }
        .meta {
            font-size: 13px;
            color: #999;
            margin-bottom: 10px;
        }
        .post-card p {
            color: #555;
            line-height: 1.6;
        }
        .read-more {
            display: inline-block;
            margin-top: 10px;
            color: #4a90e2;
            text-decoration: none;
            font-size: 14px;
        }
        .read-more:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <header>
        <h1>My Blog</h1>
        <p>Thoughts, notes and things I am learning</p>
    </header>

    {% for post in posts|reverse %}
    <div class="post-card">
        <h2><a href="/post/{{ post.id }}">{{ post.title }}</a></h2>
        <div class="meta">{{ post.date }} by {{ post.author }}</div>
        <p>{{ post.content[:120] }}...</p>
        <a class="read-more" href="/post/{{ post.id }}">Read more</a>
    </div>
    {% endfor %}

</body>
</html>
